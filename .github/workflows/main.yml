name: Update Calendar from Telegram/LINE

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: create / list / del'
        required: false
        default: 'create'
      text:
        description: 'Message Text'
        required: false
        default: ''
      chat_id:
        description: 'Telegram Chat ID or LINE User ID'
        required: true
      event_id:
        description: 'Event ID (for del)'
        required: false
        default: ''
      source:
        description: 'Source: telegram / line'
        required: false
        default: 'telegram'
  # ── 加入定時執行 ──
  schedule:
    - cron: '0 17 * * *' # 台灣時間 01:00 (UTC 17:00)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run Python Script
        env:
          TELEGRAM_TOKEN:           ${{ secrets.TELEGRAM_TOKEN }}
          GOOGLE_TOKEN_JSON:        ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          FAMILY_CAL_ID:            ${{ secrets.FAMILY_CAL_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACTION:  ${{ github.event.inputs.action || 'list' }}
          TEXT:    ${{ github.event.inputs.text || '1' }}
          CHAT_ID: ${{ github.event.inputs.chat_id || secrets.CHAT_ID }}
          EVENT_ID: ${{ github.event.inputs.event_id }}
          SOURCE:  ${{ github.event.inputs.source || 'discord' }}
        run: python AI_Calendar.py
