name: Update Calendar from Telegram

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: create / list / del'
        required: false
        default: 'create'
      text:
        description: 'Message Text (for create / list range)'
        required: false
        default: ''
      chat_id:
        description: 'Telegram Chat ID'
        required: true
      event_id:
        description: 'Event ID (for del)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          CHAT_ID:           ${{ github.event.inputs.chat_id }}
          ACTION:            ${{ github.event.inputs.action }}
          TEXT:              ${{ github.event.inputs.text }}
          EVENT_ID:          ${{ github.event.inputs.event_id }}
        run: python AI_Calendar.py
